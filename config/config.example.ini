[server]
default_connection = soc1
max_rows = 5000
cache_ttl = 300

# ── SOC1 (producción, solo lectura) ──────────────────────────────────────────
# Contraseña cifrada con Windows DPAPI. Ejecutar scripts/setup_vault.py para
# generar el token dpapi: a partir del texto plano.
[soc1]
connection_string = DRIVER={Adaptive Server Enterprise};SERVER=soc1-host;PORT=5000;DATABASE=cobis;UID=mcp_reader;PWD=dpapi:AQAAANCMnd8BFdERjH...
readonly         = true
query_timeout    = 60
connect_timeout  = 15
allow_sp         = true
sp_whitelist     = sp_cobis_saldos, sp_cobis_movimientos, sp_cobis_extracto

# ── SOC2 (QA, lectura/escritura permitida) ────────────────────────────────────
[soc2]
connection_string = DRIVER={Adaptive Server Enterprise};SERVER=soc2-host;PORT=5000;DATABASE=cobis;UID=mcp_qa;PWD=dpapi:AQAAANCMnd8BFdERjH...
readonly         = false
query_timeout    = 30
connect_timeout  = 10
allow_sp         = true
# sin whitelist → cualquier SP permitido (usar con cuidado en no-prod)

# ── staging SQL Server (ejemplo genérico) ─────────────────────────────────────
[staging_sql]
connection_string = DRIVER={ODBC Driver 18 for SQL Server};SERVER=staging;DATABASE=erp;UID=sa;PWD=dpapi:AQAAANCMnd8BFdERjH...
readonly         = false
query_timeout    = 30
connect_timeout  = 5
allow_sp         = false
